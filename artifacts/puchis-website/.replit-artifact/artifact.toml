kind = "web"
previewPath = "/"
title = "Puchis Limited Website"
version = "1.0.0"
id = "artifacts/puchis-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22946

[services.development]
run = "pnpm --filter @workspace/puchis-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puchis-website", "run", "build" ]
publicDir = "artifacts/puchis-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22946"
BASE_PATH = "/"
